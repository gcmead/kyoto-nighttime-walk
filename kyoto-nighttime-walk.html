    letter-spacing: 0.4px; text-transform: uppercase;
    border-bottom: 2px solid transparent;

  .tab:not(.active):hover { color: #ddd; }

    display: flex; gap: 0.7rem; flex-wrap: wrap;
    padding: 0.5rem 1rem; background: #f4efe5;
    font-size: 0.72rem; color: #4a4540;
    border-bottom: 1px solid #e6dfd0;

  .legend .swatch.major { background: var(--red); }
  .legend .swatch.bonus { background: var(--blue); }
  .legend .swatch.station { background: white; border: 2px solid var(--ink); }

  .list-section-header.bonus { background: var(--blue); }

  .list-card .label-badge.major { background: var(--red); }
  .list-card .label-badge.bonus { background: var(--blue); }

  .list-card .when { font-size: 0.72rem; color: var(--red); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin: 0.4rem 0; }

  .popup .when { font-size: 0.72rem; color: var(--red); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 0.5rem; }

// Business-name links (NOT coordinates) — opens the actual business listing
function appleMapsLink(p) {
  const q = p.address ? (p.name + ', ' + p.address) : p.name;
  return 'https://maps.apple.com/?q=' + encodeURIComponent(q);
}
function googleMapsLink(p) {
  const q = p.address ? (p.name + ', ' + p.address) : p.name;
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q);
}

// ===== MAP VIEW =====
const map = L.map('map').setView([35.00555793103449, 135.77159482758617], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap', maxZoom: 19
}).addTo(map);

const groups = { locked: L.layerGroup(), major: L.layerGroup(), bonus: L.layerGroup(), station: L.layerGroup() };

PINS.forEach(p => {
  const icon = L.divIcon({
    className: '',
    html: '<div class="pin ' + p.cat + '">' + p.label + '</div>',
    iconSize: p.cat === 'locked' ? [36, 36] : (p.cat === 'major' ? [28, 28] : [22, 22]),
    iconAnchor: p.cat === 'locked' ? [18, 18] : (p.cat === 'major' ? [14, 14] : [11, 11])
  });
  const marker = L.marker([p.lat, p.lon], { icon });

  const sections = [];
  const badgeLabel = p.cat === 'locked' ? 'LOCKED' : p.cat === 'major' ? 'planned' : p.cat === 'bonus' ? 'discovery' : 'station';
  sections.push('<span class="badge ' + p.cat + '">' + badgeLabel + '</span>');
  sections.push('<h3>' + p.name + '</h3>');
  if (p.when) sections.push('<div class="when">' + p.when + '</div>');
  if (p.booking) sections.push('<div class="booking">' + p.booking + '</div>');
  if (p.what) sections.push('<div class="what"><span class="section-label">What it is — </span>' + p.what + '</div>');
  if (p.why) sections.push('<div class="why"><span class="section-label">Why for you — </span>' + p.why + '</div>');
  if (p.known) sections.push('<div class="known"><span class="section-label">Known for — </span>' + p.known + '</div>');
  if (p.address) sections.push('<div class="address">' + p.address + '</div>');
  if (p.walk) sections.push('<div class="walk">↪ ' + p.walk + '</div>');
  sections.push('<a class="nav-link" href="' + appleMapsLink(p) + '" target="_blank">Apple Maps →</a>');
  sections.push('<a class="nav-link" href="' + googleMapsLink(p) + '" target="_blank">Google Maps →</a>');
  if (p.book) sections.push('<br><a class="book-link" href="' + p.book + '" target="_blank">Book / reserve →</a>');

  marker.bindPopup('<div class="popup">' + sections.join('') + '</div>');
  groups[p.cat].addLayer(marker);
});

groups.locked.addTo(map);
groups.major.addTo(map);
groups.bonus.addTo(map);
groups.station.addTo(map);

// Render path polyline if provided
const PATH = [[35.01428,135.77078],[35.01,135.7704],[35.0091,135.77],[35.0091,135.7692],[35.00833,135.76828],[35.0071,135.7696],[35.005,135.769],[35.00404,135.76859],[35.004,135.7702],[35.00339,135.77068],[35.00388,135.77242],[35.00455,135.7745],[35.00375,135.77735],[35.0021,135.7755],[35.005,135.774],[35.008,135.7726],[35.012,135.771],[35.01428,135.77078]];
if (PATH && PATH.length > 1) {
  L.polyline(PATH, {

    weight: 4,
    opacity: 0.85,
    dashArray: '12, 8',
    lineCap: 'round',
    lineJoin: 'round'

      weight: 2

  }
}

['locked', 'major', 'bonus', 'station'].forEach(cat => {

const listView = document.getElementById('list-view');
const categories = [

  { cat: 'major', title: 'Planned — the day spine' },

  pins.forEach(p => {
    const parts = [];

    parts.push('<span class="name">' + p.name + '</span>');

    if (p.what) parts.push('<div class="what"><span class="section-label">What it is — </span>' + p.what + '</div>');
    if (p.why) parts.push('<div class="why"><span class="section-label">Why for you — </span>' + p.why + '</div>');
    if (p.known) parts.push('<div class="known"><span class="section-label">Known for — </span>' + p.known + '</div>');
    if (p.tour) parts.push('<div class="tour"><span class="tour-label">📖 Walking-tour notes</span>' + p.tour + '</div>');
    if (p.address) parts.push('<div class="address">📍 ' + p.address + '</div>');
    if (p.walk) parts.push('<div class="walk">↪ ' + p.walk + '</div>');

    let links = '<div class="links">';
    links += '<a class="apple" href="' + appleMapsLink(p) + '" target="_blank">Apple Maps</a>';
    links += '<a class="google" href="' + googleMapsLink(p) + '" target="_blank">Google Maps</a>';
    if (p.book) links += '<a class="book" href="' + p.book + '" target="_blank">Book / reserve →</a>';
    links += '</div>';
    parts.push(links);

    listHtml += '<div class="list-card">' + parts.join('') + '</div>';

});

// ===== TAB SWITCHING =====
const mapEl = document.getElementById('map');
const legend = document.getElementById('legend');
const tabMap = document.getElementById('tab-map');
const tabList = document.getElementById('tab-list');

function showMap() {
  tabMap.classList.add('active');
  tabList.classList.remove('active');
  mapEl.classList.remove('hidden');
  listView.classList.remove('active');
  legend.style.display = '';
  setTimeout(() => map.invalidateSize(), 50);
}
function showList() {
  tabList.classList.add('active');
  tabMap.classList.remove('active');
  mapEl.classList.add('hidden');
  listView.classList.add('active');
  legend.style.display = 'none';
}
tabMap.addEventListener('click', showMap);
tabList.addEventListener('click', showList);

// ===== LIVE LOCATION =====
let userMarker = null, userCircle = null, watchId = null, firstFix = true;
const locateBtn = document.getElementById('locate');

function startTracking() {
  if (!navigator.geolocation) { alert('Geolocation not supported on this device.'); return; }
  locateBtn.textContent = '📍 Locating…';
  firstFix = true;
  watchId = navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, accuracy } = pos.coords;
    if (userMarker) map.removeLayer(userMarker);
    if (userCircle) map.removeLayer(userCircle);
    userMarker = L.marker([latitude, longitude], {
      icon: L.divIcon({ className: '', html: '<div class="pin you"></div>', iconSize: [18,18], iconAnchor: [9,9] })
    }).addTo(map);
    userCircle = L.circle([latitude, longitude], {
      radius: accuracy, color: '#2A8C4F', fillColor: '#2A8C4F', fillOpacity: 0.1, weight: 1
    }).addTo(map);
    if (firstFix) {
      map.setView([latitude, longitude], Math.max(map.getZoom(), 15));
      firstFix = false;
    }
    locateBtn.textContent = '📍 Re-center';
  }, err => {
    alert('Location error: ' + err.message);
    locateBtn.textContent = '📍 Where am I';
    watchId = null;
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 });
}

locateBtn.addEventListener('click', () => {
  if (watchId === null) startTracking();
  else if (userMarker) map.setView(userMarker.getLatLng(), Math.max(map.getZoom(), 15));
});
</script>
